<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Auditoria Operativa — ENDER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root{--bg:#0f0f0f;--sf:#1a1a1a;--sf2:#242424;--bd:#2e2e2e;--tx:#f0ede8;--mu:#888580;--ac:#f5a623;--gr:#4ade80;--grd:rgba(74,222,128,.1);--rd:#f87171;--rdd:rgba(248,113,113,.1);--yw:#fbbf24;--ywd:rgba(251,191,36,.1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.pg{display:none;min-height:100vh;padding-bottom:100px}
.pg.on{display:block}
/* HEADER */
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:16px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.brand{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--ac);text-transform:uppercase;margin-bottom:2px}
.hdr h1{font-size:18px;font-weight:600}
.ring{width:56px;height:56px;flex-shrink:0}
.ring svg{width:100%;height:100%}
.meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.mf{background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:8px 10px}
.mf label{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;font-family:'DM Mono',monospace;display:block;margin-bottom:2px}
.mf select,.mf input{background:none;border:none;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;width:100%;outline:none;cursor:pointer;padding:0}
.mf select option{background:var(--sf2)}
.pw{margin-top:10px;display:flex;align-items:center;gap:8px}
.pb{flex:1;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.pl{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);white-space:nowrap}
/* BLOQUES */
.blq{margin:10px 12px 0}
.btt{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--mu);text-transform:uppercase;padding:12px 4px 6px;display:flex;justify-content:space-between;border-bottom:1px solid var(--bd);margin-bottom:6px}
.bpts{color:var(--ac)}
/* SECCIONES */
.sec{margin-bottom:6px;border-radius:11px;overflow:hidden;border:1px solid var(--bd)}
.sh{padding:12px 13px;background:var(--sf);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;gap:8px}
.sl{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.st{font-size:13px;font-weight:600}
.ss{font-size:10px;color:var(--mu);margin-top:1px}
.sr{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sc{font-family:'DM Mono',monospace;font-size:11px;color:var(--mu)}
.sc.ok{color:var(--gr)}.sc.md{color:var(--yw)}.sc.bd{color:var(--rd)}
.cv{color:var(--mu);font-size:10px;transition:transform .2s;display:inline-block}
.cv.op{transform:rotate(180deg)}
.sb{background:var(--sf2)}
.sb.col{display:none}
/* ITEMS */
.itm{padding:12px 13px;border-top:1px solid var(--bd);display:flex;align-items:flex-start;gap:10px}
.it{flex:1;min-width:0}
.il{font-size:13px;line-height:1.4}
.is{font-size:10px;color:var(--mu);line-height:1.3;margin-top:1px}
/* BOTONES BOOL */
.bg{display:flex;gap:3px;flex-shrink:0}
.bb{height:32px;padding:0 9px;min-width:36px;border-radius:6px;border:1.5px solid var(--bd);background:none;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--mu);flex-shrink:0}
.bb:active{transform:scale(.88)}
.bb.si.on{background:var(--grd);border-color:var(--gr);color:var(--gr)}
.bb.no.on{background:var(--rdd);border-color:var(--rd);color:var(--rd)}
.bb.na.on{background:rgba(136,133,128,.15);border-color:var(--mu);color:var(--mu)}
/* ESCALA */
.sk{display:flex;gap:2px;flex-shrink:0;align-items:center}
.sbb{width:23px;height:32px;border-radius:5px;border:1.5px solid var(--bd);background:none;cursor:pointer;font-size:10px;font-family:'DM Mono',monospace;font-weight:500;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--mu);flex-shrink:0}
.sbb:active{transform:scale(.88)}
.sbb.lo{background:var(--rdd);border-color:var(--rd);color:var(--rd)}
.sbb.mi{background:var(--ywd);border-color:var(--yw);color:var(--yw)}
.sbb.hi{background:var(--grd);border-color:var(--gr);color:var(--gr)}
/* HINTS Y NOTAS */
.hn{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;padding:5px 13px 8px;background:var(--sf2);border-top:1px solid var(--bd);display:block;font-style:italic}
.nw{padding:0 13px 10px;background:var(--sf2);border-top:1px solid var(--bd)}
.nl{font-size:9px;color:var(--mu);font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;padding-top:8px;margin-bottom:4px;display:block}
.ni{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:7px;padding:8px 10px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;resize:none;outline:none;min-height:48px}
.ni::placeholder{color:var(--mu)}
/* RESULTADO */
.res{margin:14px 12px 0;background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.rh{padding:11px 14px;border-bottom:1px solid var(--bd);font-size:9px;font-family:'DM Mono',monospace;letter-spacing:.15em;color:var(--mu);text-transform:uppercase}
.rb{display:flex;flex-direction:column;gap:1px;background:var(--bd)}
.bc{background:var(--sf2);padding:11px 14px;display:flex;justify-content:space-between;align-items:center}
.bn{font-size:11px;color:var(--mu)}
.br{display:flex;align-items:baseline;gap:3px}
.bs{font-family:'DM Mono',monospace;font-size:19px;font-weight:500}
.bm{font-family:'DM Mono',monospace;font-size:10px;color:var(--mu)}
.bs.ok{color:var(--gr)}.bs.md{color:var(--yw)}.bs.bd{color:var(--rd)}
.tr{padding:14px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bd)}
.tl{font-size:13px;font-weight:600}
.ts{font-family:'DM Mono',monospace;font-size:28px;font-weight:500}
.ts.ve{color:var(--gr)}.ts.am{color:var(--yw)}.ts.ro{color:var(--rd)}
.vd{margin:0 12px;padding:10px 13px;border-radius:9px;font-size:12px;font-weight:500;text-align:center}
.vd.ve{background:var(--grd);color:var(--gr)}.vd.am{background:var(--ywd);color:var(--yw)}.vd.ro{background:var(--rdd);color:var(--rd)}
/* ACCIONES */
.ac{padding:10px 12px 16px;display:flex;flex-direction:column;gap:6px}
.bp{width:100%;padding:13px;background:var(--ac);color:#0f0f0f;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.bse{width:100%;padding:11px;background:var(--sf2);color:var(--tx);border:1px solid var(--bd);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
.bg2{width:100%;padding:10px;background:none;color:var(--mu);border:1px solid var(--bd);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
/* PANTALLA RESULTADOS */
.nb{background:var(--sf);border-bottom:1px solid var(--bd);padding:13px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.bk{background:none;border:1px solid var(--bd);color:var(--tx);border-radius:7px;padding:5px 11px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
.nt{font-size:14px;font-weight:600}
.tb{display:flex;gap:5px;padding:12px 12px 4px}
.tbt{flex:1;padding:8px;border-radius:7px;border:1.5px solid var(--bd);background:none;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s}
.tbt.on{background:var(--ac);color:#0f0f0f;border-color:var(--ac)}
.rc{padding:0 12px 12px}
.rcd{background:var(--sf);border:1px solid var(--bd);border-radius:11px;overflow:hidden;margin-bottom:8px}
.rcdh{padding:11px 13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd)}
.rcdt{font-size:13px;font-weight:600}
.rcds{font-family:'DM Mono',monospace;font-size:20px;font-weight:500}
.rcds.ve{color:var(--gr)}.rcds.am{color:var(--yw)}.rcds.ro{color:var(--rd)}
.bw{padding:8px 13px 10px}
.br2{margin-bottom:6px}
.bl{display:flex;justify-content:space-between;font-size:10px;color:var(--mu);margin-bottom:2px}
.bbg{height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .4s}
.hr{padding:10px 13px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.hf{font-size:12px;font-weight:500}
.hm{font-size:10px;color:var(--mu);margin-top:1px}
.hs{font-family:'DM Mono',monospace;font-size:15px}
.hs.ve{color:var(--gr)}.hs.am{color:var(--yw)}.hs.ro{color:var(--rd)}
.db{background:none;border:none;color:var(--rd);font-size:10px;cursor:pointer;padding:2px 5px;opacity:.6;margin-left:6px}
.em{text-align:center;padding:36px 20px;color:var(--mu);font-size:13px;line-height:1.6}
.cg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:0 12px 8px}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.cch{padding:9px 9px 7px;border-bottom:1px solid var(--bd);text-align:center}
.ccn{font-size:10px;font-weight:600;line-height:1.2}
.ccs{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;display:block;margin-top:3px}
.ccs.ve{color:var(--gr)}.ccs.am{color:var(--yw)}.ccs.ro{color:var(--rd)}
.cb{padding:5px 9px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.cbn{font-size:9px;color:var(--mu);line-height:1.3}
.cbv{font-family:'DM Mono',monospace;font-size:9px}
.tw{padding:0 12px 12px}
.tt{font-family:'DM Mono',monospace;font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;padding:12px 0 8px}
.trow{margin-bottom:9px}
.tlbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}

/* DASHBOARD */
.dash-local-sel{padding:8px 12px 0;display:flex;gap:6px}
.dash-local-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);color:var(--mu);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;text-align:center}
.dash-local-btn.on{background:var(--tx);color:white;border-color:var(--tx)}
.dash-wrap{padding:8px 12px 12px}
.dash-mes-sel{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dash-mes-sel select{flex:1;background:var(--sf);border:1.5px solid var(--bd);border-radius:8px;padding:8px 10px;color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;outline:none}
.dash-bono-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:10px}
.dash-bono-hdr{padding:14px 16px;border-bottom:1.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.dash-bono-title{font-size:13px;font-weight:700}
.dash-bono-pct{font-family:'Inter Mono',monospace;font-size:26px;font-weight:700}
.dash-bono-pct.ok{color:var(--gr)}.dash-bono-pct.no{color:var(--rd)}
.dash-bono-sub{font-size:10px;color:var(--mu);margin-top:2px}
.dash-apartado{padding:12px 16px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.dash-apt-left{flex:1}
.dash-apt-name{font-size:12px;font-weight:600}
.dash-apt-det{font-size:10px;color:var(--mu);margin-top:2px}
.dash-apt-right{text-align:right;flex-shrink:0;margin-left:12px}
.dash-apt-score{font-family:'Inter Mono',monospace;font-size:16px;font-weight:700}
.dash-apt-score.ok{color:var(--gr)}.dash-apt-score.no{color:var(--rd)}.dash-apt-score.mu{color:var(--mu)}
.dash-apt-bono{font-size:10px;margin-top:2px;font-weight:600}
.dash-apt-bono.ok{color:var(--gr)}.dash-apt-bono.no{color:var(--rd)}
.dash-bar-wrap{padding:6px 16px 12px}
.dash-bar-row{margin-bottom:6px;display:flex;align-items:center;gap:8px}
.dash-bar-lbl{font-size:10px;color:var(--mu);width:80px;flex-shrink:0}
.dash-bar-bg{flex:1;height:6px;background:var(--sf2);border-radius:3px;overflow:hidden;border:1px solid var(--bd)}
.dash-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.dash-bar-val{font-family:'Inter Mono',monospace;font-size:10px;font-weight:600;width:36px;text-align:right;flex-shrink:0}
.dash-auds{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:10px}
.dash-auds-hdr{padding:12px 16px;border-bottom:1.5px solid var(--bd);font-size:10px;font-family:'Inter Mono',monospace;letter-spacing:.1em;color:var(--mu);text-transform:uppercase}
.dash-aud-row{padding:12px 16px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.dash-aud-fecha{font-size:13px;font-weight:600}
.dash-aud-meta{font-size:10px;color:var(--mu);margin-top:2px}
.dash-aud-score{font-family:'Inter Mono',monospace;font-size:18px;font-weight:700}
.dash-empty{text-align:center;padding:40px 20px;color:var(--mu);font-size:13px;line-height:1.7}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1.5px solid var(--bd);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0 12px;background:none;border:none;cursor:pointer;color:var(--mu);font-family:'Inter',sans-serif;font-size:10px;font-weight:600;transition:color .15s}
.bnav-btn.on{color:var(--tx)}
.bnav-btn svg{transition:stroke .15s}
body{padding-bottom:70px}
</style>
</head>
<body>

<!-- PANTALLA AUDITORIA -->
<div id="p1" class="pg on">
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="brand">ENDER — Control de calidad</div>
      <h1>Auditoria operativa</h1>
    </div>
    <div class="ring">
      <svg viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="#2e2e2e" stroke-width="5"/>
        <circle id="rf" cx="32" cy="32" r="26" fill="none" stroke="#888580"
          stroke-width="5" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="163.4"
          transform="rotate(-90 32 32)" style="transition:stroke-dashoffset .4s,stroke .3s"/>
        <text id="rt" x="32" y="37" text-anchor="middle" font-size="12" font-family="DM Mono,monospace" fill="#f0ede8">--</text>
      </svg>
    </div>
  </div>
  <div class="meta">
    <div class="mf"><label>Local</label>
      <select id="sl"><option value="">--</option><option>ENDER Quilmes</option><option>ENDER Bernal</option><option>ENDER Berazategui</option></select>
    </div>
    <div class="mf"><label>Fecha</label><input type="date" id="fe"></div>
    <div class="mf"><label>Turno</label>
      <select id="tu"><option value="">--</option><option>Mediodia</option><option>Noche</option></select>
    </div>
  </div>
  <div class="pw"><div class="pb"><div class="pf" id="pr" style="width:0%"></div></div><span class="pl" id="pl">0 / 0</span></div>
</div>
<div id="ab"></div>
<div class="res">
  <div class="rh">Resultado</div>
  <div class="rb" id="rb"></div>
  <div class="tr"><span class="tl">Puntaje total</span><span class="ts ro" id="td">-- / 100</span></div>
</div>
<div class="vd ro" id="vd">Completar la auditoría para ver el resultado</div>
<div class="ac">
  <button class="bp" id="bgrd" onclick="guardar()">Guardar auditoría</button>
  
  <button class="bg2" onclick="reset()">Nueva auditoría</button>
</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bnav">
  <button class="bnav-btn on" id="bnav-audit" onclick="goA()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    <span>Auditoría</span>
  </button>
  <button class="bnav-btn" id="bnav-results" onclick="goR()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <span>Resultados</span>
  </button>
</div>

<!-- PANTALLA RESULTADOS -->
<div id="p2" class="pg">
  <div class="nb"><button class="bk" onclick="goA()">Volver</button><span class="nt">Resultados</span></div>
  <div class="tb">
    <button class="tbt on" id="td" onclick="showTab('d')">Dashboard</button>
    <button class="tbt" id="tl" onclick="showTab('l')">Por local</button>
    <button class="tbt" id="tc" onclick="showTab('c')">Comparativa</button>
    <button class="tbt" id="te" onclick="showTab('e')">Empleados</button>
  </div>
  <div id="vd"></div>
  <div id="vl" style="display:none"></div>
  <div id="vc" style="display:none"></div>
  <div id="ve" style="display:none"></div>
</div>

<script>
var D = [
  {id:'desempeno',tt:'Desempeño operativo',w:40,cl:'#f5a623',secs:[
    {id:'planchero',tt:'Planchero',its:[
      {id:'pl1',lb:'Manejo de temperatura de plancha',sb:'Regula según el volumen del servicio',t:'m',w:3},
      {id:'pl3',lb:'Aplicación de técnica smash',sb:'Presión firme en un solo movimiento',t:'m',w:4},
      {id:'pl2',lb:'Raspado de superficie de plancha entre tandas',sb:'Sin que se lo recuerden',t:'m',w:2},
      {id:'pl4',lb:'Control del límite de bolitas por plancha',sb:'Máximo 18 por plancha',t:'b',w:2,na:1},
      {id:'pl6',lb:'Traslado de medallones en bandeja',t:'b',w:1},
      {id:'pl5',lb:'Velocidad de desempeño',t:'m',w:1}
    ]},
    {id:'armador',tt:'Armador',its:[
      {id:'ar1',lb:'Calidad de corte y tostado de panes',sb:'Parejo, con manteca clarificada, caliente',t:'m',w:4},
      {id:'ar2',lb:'Prolijidad y medida de toppings',sb:'Sin exceso ni faltante, dentro del pan',t:'m',w:3},
      {id:'ar3',lb:'Prolijidad de envoltorio y etiqueta',t:'m',w:2},
      {id:'ar5',lb:'Acumulación de panes tostados en baja demanda',t:'b',w:1,na:1},
      {id:'ar4',lb:'Velocidad de desempeño',t:'m',w:1}
    ]},
    {id:'freidor',tt:'Freidor',its:[
      {id:'fr2',lb:'Escurrido de canastos de freidora',sb:'Sin chorrear aceite al trasladar',t:'b',w:2},
      {id:'fr4',lb:'Manipulación de productos con pinza',sb:'Nunca con la mano al sacar de freidora',t:'b',w:1,na:1},
      {id:'fr6',lb:'Calidad de rebozado de Supremas/Chicken Bites',sb:'Cobertura pareja, sin exceso ni faltante de harina',t:'m',w:3,na:1},
      {id:'fr5',lb:'Velocidad de desempeño',t:'m',w:2}
    ]},
    {id:'runner',tt:'Runner',its:[
      {id:'ru0',lb:'Prolijidad de empaquetado',sb:'Nombre, carita feliz, dobles de bolsa, posición de comanda',t:'m',w:2},
      {id:'ru1',lb:'Preparación anticipada de bolsas, salsas y extras',sb:'Antes de que el pedido esté listo',t:'m',w:1},
      {id:'ru2',lb:'Guardado de productos en presentación correcta',sb:'Salón en bandeja / delivery en caja y bolsa',t:'b',w:1},
      {id:'ru3',lb:'Control del pedido antes de ser guardado/entregado',t:'b',w:2},
      {id:'ru4',lb:'Velocidad de desempeño',t:'m',w:1}
    ]},

function toggleS(id){
  var sb=document.getElementById('sb'+id), cv=document.getElementById('cv'+id);
  var col=sb.classList.contains('col');
  sb.classList.toggle('col',!col);
  cv.classList.toggle('op',col);
}

function setV(sid,iid,val,isBool){
  S[sid][iid]=val;
  // Siempre limpiar todos los botones del item primero
  document.querySelectorAll('[data-s="'+sid+'"][data-i="'+iid+'"]').forEach(function(b){
    b.classList.remove('on','lo','mi','hi');
  });
  if(isBool){
    document.querySelectorAll('[data-s="'+sid+'"][data-i="'+iid+'"]').forEach(function(b){
      if(parseInt(b.dataset.v)===val)b.classList.add('on');
    });
  } else {
    document.querySelectorAll('[data-s="'+sid+'"][data-i="'+iid+'"]').forEach(function(b){
      if(parseInt(b.dataset.v)===val){
        b.classList.add(val<=4?'lo':val<=7?'mi':'hi');
      }
    });
  }
  recalc();
}

function secSc(sec){
  var e=0,m=0,a=0;
  sec.its.forEach(function(it){
    var v=S[sec.id][it.id];
    if(v===-1){a++;return;}
    m+=it.w;
    if(v!==null){a++;e+=it.t==='b'?(v===1?it.w:0):it.t==='m'?(v===1?0:v===2?it.w*0.25:v===3?it.w*0.5:v===4?it.w*0.75:it.w):(v/10)*it.w;}
  });
  return{e:e,m:m,pct:m>0?Math.round(e/m*100):0,a:a,c:sec.its.length};
}

function blqSc(b){
  var te=0,tm=0,ta=0,tc=0;
  b.secs.forEach(function(s){var r=secSc(s);te+=r.e;tm+=r.m;ta+=r.a;tc+=r.c;});
  return{pct:tm>0?Math.round(te/tm*100):0,sc:tm>0?(te/tm)*b.w:0,a:ta,c:tc};
}

function cl(p){return p>=80?'ok':p>=60?'md':'bd';}
function cv(p){return p>=80?'ve':p>=60?'am':'ro';}

function recalc(){
  var tot=0,ta=0,tc=0;
  D.forEach(function(b){
    var r=blqSc(b);tot+=r.sc;ta+=r.a;tc+=r.c;
    b.secs.forEach(function(s){
      var sr=secSc(s);
      var el=document.getElementById('sc'+s.id);
      if(el){el.textContent=sr.a===0?'--':sr.pct+'%';el.className='sc '+(sr.a===0?'bd':cl(sr.pct));}
    });
    var be=document.getElementById('bs'+b.id);
    if(be){be.textContent=r.a===0?'--':Math.round(r.sc);be.className='bs '+(r.a===0?'bd':cl(r.pct));}
  });
  var fin=Math.round(tot);
  var pg=tc>0?Math.round(ta/tc*100):0;
  document.getElementById('pr').style.width=pg+'%';
  document.getElementById('pl').textContent=ta+' / '+tc;
  var rf=document.getElementById('rf'); var c=163.4;
  if(ta===0){rf.style.strokeDashoffset=c;rf.style.stroke='#888580';document.getElementById('rt').textContent='--';}
  else{rf.style.strokeDashoffset=c-(c*fin/100);rf.style.stroke=fin>=80?'#4ade80':fin>=60?'#fbbf24':'#f87171';document.getElementById('rt').textContent=fin;}
  var td=document.getElementById('td');
  td.textContent=ta===0?'-- / 100':fin+' / 100';
  td.className='ts '+(ta===0?'ro':cv(fin));
  var vd=document.getElementById('vd');
  if(ta===0){vd.textContent='Completar la auditoría para ver el resultado';vd.className='vd ro';}
  else if(fin>=80){vd.textContent='Aprobado - Buen nivel operativo';vd.className='vd ve';}
  else if(fin>=60){vd.textContent='Requiere mejoras - Seguimiento en proxima visita';vd.className='vd am';}
  else{vd.textContent='Estado critico - Accion correctiva inmediata';vd.className='vd ro';}
}

// GUARDAR
function guardar(){
  var loc=document.getElementById('sl').value;
  var fec=document.getElementById('fe').value;
  var tur=document.getElementById('tu').value;
  if(!loc||!fec||!tur){alert('Completá Local, Fecha y Turno antes de guardar.');return;}
  var tot=0,bs={};
  var empleados={};
  ['planchero','armador','freidor','runner','tp','en'].forEach(function(pid){
    var el=document.getElementById('emp-'+pid);
    if(el&&el.value.trim())empleados[pid]=el.value.trim();
  });
  // Save section-level scores for employee tracking
  var secScores={};
  D.forEach(function(b){
    var r=blqSc(b);tot+=r.sc;bs[b.id]={pts:Math.round(r.sc),pct:r.pct,tt:b.tt,w:b.w};
    b.secs.forEach(function(s){
      var sr=secSc(s);
      var its={};
      s.its.forEach(function(it){its[it.id]={v:S[s.id][it.id],lb:it.lb,w:it.w,t:it.t};});
      secScores[s.id]={pct:sr.pct,tt:s.tt,its:its};
    });
  });
  var rec={id:Date.now(),fecha:fec,local:loc,turno:tur,total:Math.round(tot),bs:bs,empleados:empleados,secScores:secScores};
  var btn=document.getElementById('bgrd');
  btn.textContent='Guardando...';btn.disabled=true;
  guardarRemoto(rec).then(function(ok){
    var h=getH();h.unshift(rec);setH(h);
    btn.textContent=ok?'Guardado':'Guardado localmente';
    btn.style.background=ok?'#16a34a':'#d97706';
    btn.style.color='white';
    btn.disabled=false;
    setTimeout(function(){btn.textContent='Guardar auditoría';btn.style.background='';btn.style.color='';reset(true);},2500);
  }).catch(function(){
    var h=getH();h.unshift(rec);setH(h);
    btn.textContent='Guardado localmente';btn.style.background='#d97706';btn.style.color='white';
    btn.disabled=false;
    setTimeout(function(){btn.textContent='Guardar auditoría';btn.style.background='';btn.style.color='';reset(true);},2500);
  });
}

  D.forEach(function(b){b.secs.forEach(function(s){
    s.its.forEach(function(i){
      S[s.id][i.id]=null;
      document.querySelectorAll('[data-s="'+s.id+'"][data-i="'+i.id+'"]').forEach(function(b){
        b.classList.remove('on','lo','mi','hi');

  document.getElementById('sl').value='';

  return meses;
}

function getMesLabel(ym) {
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var parts = ym.split('-');
  return meses[parseInt(parts[1])-1] + ' ' + parts[0];
}

function calcPromMes(audits) {
  if(!audits||!audits.length) return null;
  var result = { total: 0, bloques: {} };
  var blqs = Object.keys(BONO.bloques);
  blqs.forEach(function(bid){
    var withData = audits.filter(function(a){return a.bs && a.bs[bid] && a.bs[bid].pct > 0;});
    if(withData.length === 0){result.bloques[bid]=null;return;}
    var vals = withData.map(function(a){return a.bs[bid].pct;});
    result.bloques[bid] = Math.round(vals.reduce(function(s,v){return s+v;},0)/vals.length);
  });
  var tots = audits.filter(function(a){return a.total>0;}).map(function(a){return a.total||0;});
  result.total = tots.length>0 ? Math.round(tots.reduce(function(s,v){return s+v;},0)/tots.length) : 0;
  return result;
}

function renderD() {
  var el = document.getElementById('vd');
  el.innerHTML = '';

  // Local selector
  var localSel = document.createElement('div');
  localSel.className = 'dash-local-sel';
  LOCALES.forEach(function(loc){
    var btn = document.createElement('button');
    btn.className = 'dash-local-btn' + (loc===DASH_LOCAL?' on':'');
    btn.textContent = loc.replace('ENDER ','');
    btn.onclick = function(){DASH_LOCAL=loc;renderD();};
    localSel.appendChild(btn);
  });
  el.appendChild(localSel);

  // Loading indicator
  var loading = document.createElement('div');
  loading.className = 'dash-empty';
  loading.id = 'dash-loading';
  loading.textContent = 'Cargando...';
  el.appendChild(loading);

  getHRemoto().then(function(remoto){
    var h = remoto&&remoto.length>0 ? remoto.map(function(r){return JSON.parse(r.data);}) : getH();
    var ld = document.getElementById('dash-loading');
    if(ld) ld.remove();
    renderDData(h, el);
  }).catch(function(){
    var ld = document.getElementById('dash-loading');
    if(ld) ld.remove();
    renderDData(getH(), el);
  });
}

function renderDData(h, el) {
  // Remove old content after local selector
  var existing = el.querySelector('.dash-wrap');
  if(existing) existing.remove();

  var wrap = document.createElement('div');
  wrap.className = 'dash-wrap';

  var meses = getMeses(h, DASH_LOCAL);
  var mesKeys = Object.keys(meses).sort().reverse();

  if(mesKeys.length === 0) {
    wrap.innerHTML = '<div class="dash-empty">No hay auditorías para<br><strong>'+DASH_LOCAL+'</strong><br><br>Guardá al menos una auditoría para ver el dashboard.</div>';
    el.appendChild(wrap);
    return;
  }

  // Mes selector
  if(!DASH_MES || mesKeys.indexOf(DASH_MES)===-1) DASH_MES = mesKeys[0];
  var mesDiv = document.createElement('div');
  mesDiv.className = 'dash-mes-sel';
  var mesLbl = document.createElement('span');
  mesLbl.style.cssText='font-size:11px;color:var(--mu);font-weight:600;white-space:nowrap';
  mesLbl.textContent='Mes:';
  var mesSel = document.createElement('select');
  mesKeys.forEach(function(mk){
    var opt = document.createElement('option');
    opt.value = mk;
    opt.textContent = getMesLabel(mk) + ' (' + meses[mk].length + ' aud.)';
    if(mk===DASH_MES) opt.selected = true;
    mesSel.appendChild(opt);
  });
  mesSel.onchange = function(){DASH_MES=this.value;renderD();};
  mesDiv.appendChild(mesLbl);
  mesDiv.appendChild(mesSel);
  wrap.appendChild(mesDiv);

  var audsMes = meses[DASH_MES] || [];
  var prom = calcPromMes(audsMes);

  // Bono card
  var bonoCard = document.createElement('div');
  bonoCard.className = 'dash-bono-card';

  // Calcular bono ganado
  var bonoGanado = 0;
  var blqs = Object.keys(BONO.bloques);
  blqs.forEach(function(bid){
    if(prom && prom.bloques[bid] >= BONO.min) {
      bonoGanado += BONO.bloques[bid].pct;
    }
  });

  var bonoClass = bonoGanado >= BONO.total ? 'ok' : bonoGanado > 0 ? 'no' : 'no';
  var html = '<div class="dash-bono-hdr">';
  html += '<div><div class="dash-bono-title">Bono de calidad — '+getMesLabel(DASH_MES)+'</div>';
  html += '<div class="dash-bono-sub">Mínimo 85% por apartado · '+audsMes.length+' auditoría'+( audsMes.length!==1?'s':'')+' en el mes</div></div>';
  html += '<div><div class="dash-bono-pct '+bonoClass+'">'+bonoGanado.toFixed(2)+'%</div>';
  html += '<div style="font-size:10px;color:var(--mu);text-align:right">de 45% posible</div></div>';
  html += '</div>';

  // Barra total
  html += '<div class="dash-bar-wrap">';
  html += '<div class="dash-bar-row">';
  html += '<span class="dash-bar-lbl">Bono ganado</span>';
  html += '<div class="dash-bar-bg"><div class="dash-bar-fill" style="width:'+Math.min(100,bonoGanado/BONO.total*100)+'%;background:'+(bonoGanado>=BONO.total?'var(--gr)':bonoGanado>0?'var(--yw)':'var(--rd)')+'"></div></div>';
  html += '<span class="dash-bar-val" style="color:'+(bonoGanado>=BONO.total?'var(--gr)':bonoGanado>0?'var(--yw)':'var(--rd)')+'">'+bonoGanado.toFixed(1)+'%</span>';
  html += '</div></div>';

  // Apartados
  blqs.forEach(function(bid){
    var cfg = BONO.bloques[bid];
    var pct = prom ? prom.bloques[bid] : null;
    var suma = pct !== null && pct >= BONO.min;
    var col = pct === null ? 'mu' : suma ? 'ok' : 'no';
    var barCol = pct === null ? 'var(--bd)' : suma ? 'var(--gr)' : 'var(--rd)';
    var minLine = document.createElement('div');

    html += '<div class="dash-apartado">';
    html += '<div class="dash-apt-left">';
    html += '<div class="dash-apt-name">'+cfg.nombre+'</div>';
    html += '<div class="dash-apt-det">Mínimo 85% · Vale '+cfg.pct+'% del bono</div>';
    // Mini bar
    html += '<div style="display:flex;align-items:center;gap:6px;margin-top:5px">';
    html += '<div class="dash-bar-bg" style="flex:1;height:5px"><div class="dash-bar-fill" style="width:'+(pct||0)+'%;background:'+barCol+'"></div></div>';
    // Min marker at 85%
    html += '</div>';
    html += '</div>';
    html += '<div class="dash-apt-right">';
    html += '<div class="dash-apt-score '+col+'">'+(pct!==null?pct+'%':'--')+'</div>';
    html += '<div class="dash-apt-bono '+(pct!==null?(suma?'ok':'no'):'')+'">'+( pct===null?'Sin datos':suma?'✓ +'+cfg.pct+'%':'✗ No suma')+'</div>';
    html += '</div>';
    html += '</div>';
  });

  bonoCard.innerHTML = html;
  wrap.appendChild(bonoCard);

  // Auditorías del mes
  if(audsMes.length > 0) {
    var audsCard = document.createElement('div');
    audsCard.className = 'dash-auds';
    var audsHtml = '<div class="dash-auds-hdr">Auditorías del mes</div>';
    audsMes.sort(function(a,b){return b.fecha.localeCompare(a.fecha);}).forEach(function(a){
      var c = cv(a.total);
      audsHtml += '<div class="dash-aud-row">';
      audsHtml += '<div><div class="dash-aud-fecha">'+a.fecha+'</div><div class="dash-aud-meta">'+a.turno+'</div></div>';
      audsHtml += '<div class="dash-aud-score '+c+'">'+a.total+'<span style="font-size:11px;color:var(--mu)">/100</span></div>';
      audsHtml += '</div>';
    });
    if(audsMes.length >= 2) {
      audsHtml += '<div style="padding:10px 16px;border-top:1.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--sf2)">';
      audsHtml += '<span style="font-size:12px;font-weight:700">Promedio del mes</span>';
      audsHtml += '<span style="font-family:Inter Mono,monospace;font-size:18px;font-weight:700;color:'+(prom.total>=80?'var(--gr)':prom.total>=60?'var(--yw)':'var(--rd)')+'">'+prom.total+'<span style="font-size:11px;color:var(--mu)">/100</span></span>';
      audsHtml += '</div>';
    }
    audsCard.innerHTML = audsHtml;
    wrap.appendChild(audsCard);
  }

  el.appendChild(wrap);
}

function renderL(){
  var el=document.getElementById('vl');
  el.innerHTML='<div class="em">Cargando...</div>';
  getHRemoto().then(function(remoto){
    var h=remoto&&remoto.length>0?remoto.map(function(r){return JSON.parse(r.data);}):getH();
    renderLData(h,el);
  }).catch(function(){
    renderLData(getH(),el);
  });
}
function renderLData(h,el){
  el.innerHTML='';
  if(h.length===0){el.innerHTML='<div class="em">No hay auditorías guardadas todavía.<br>Completá una auditoría y tocá<br><strong>Guardar auditoría</strong>.</div>';return;}
  var wr=document.createElement('div');wr.className='rc';
  LOCS.forEach(function(loc){
    var aud=h.filter(function(a){return a.local===loc;});
    var card=document.createElement('div');card.className='rcd';
    if(aud.length===0){card.innerHTML='<div class="rcdh"><span class="rcdt">'+loc+'</span><span style="font-size:11px;color:var(--mu)">Sin auditorias</span></div>';wr.appendChild(card);return;}
    var last=aud[0];var cv2=cv(last.total);
    var html='<div class="rcdh"><span class="rcdt">'+loc+'</span><span class="rcds '+cv2+'">'+last.total+'</span></div>';
    html+='<div class="bw">';
    Object.values(last.bs).forEach(function(b){
      var col=b.pct>=80?'#4ade80':b.pct>=60?'#fbbf24':'#f87171';
      html+='<div class="br2"><div class="bl"><span>'+b.tt+'</span><span>'+b.pts+'/'+b.w+'</span></div><div class="bbg"><div class="bf" style="width:'+b.pct+'%;background:'+col+'"></div></div></div>';
    });
    html+='</div>';
    html+='<div style="padding:6px 13px 3px;font-size:9px;color:var(--mu);font-family:DM Mono,monospace;text-transform:uppercase;letter-spacing:.1em">Historial</div>';
    aud.slice(0,8).forEach(function(a){
      var c=cv(a.total);
      html+='<div class="hr"><div><div class="hf">'+a.fecha+'</div><div class="hm">'+a.turno+'</div></div><div style="display:flex;align-items:center"><span class="hs '+c+'">'+a.total+'</span><button class="db" onclick="delA('+a.id+')">x</button></div></div>';
    });
    card.innerHTML=html;wr.appendChild(card);
  });
  el.appendChild(wr);
}

function renderC(){
  var el=document.getElementById('vc');
  el.innerHTML='<div class="em">Cargando...</div>';
  getHRemoto().then(function(remoto){
    var h=remoto&&remoto.length>0?remoto.map(function(r){return JSON.parse(r.data);}):getH();
    renderCData(h,el);
  }).catch(function(){
    renderCData(getH(),el);
  });
}
function renderCData(h,el){
  el.innerHTML='';
  if(h.length===0){el.innerHTML='<div class="em">No hay auditorías guardadas todavía.</div>';return;}
  var grid=document.createElement('div');grid.className='cg';
  LOCS.forEach(function(loc){
    var last=h.find(function(a){return a.local===loc;});
    var card=document.createElement('div');card.className='cc';
    var nom=loc.replace('ENDER ','');
    if(!last){card.innerHTML='<div class="cch"><div class="ccn">'+nom+'</div><span class="ccs" style="color:var(--mu);font-size:14px">--</span></div>';}
    else{
      var c=cv(last.total);
      var html='<div class="cch"><div class="ccn">'+nom+'</div><span class="ccs '+c+'">'+last.total+'</span></div>';
      Object.values(last.bs).forEach(function(b){
        var col=b.pct>=80?'var(--gr)':b.pct>=60?'var(--yw)':'var(--rd)';
        var sh=b.tt.replace('Desempeno operativo','Desempeno').replace('Limpieza cocina','Limp. cocina').replace('Limpieza local','Limp. local').replace('Atencion al cliente','Atencion');
        html+='<div class="cb"><span class="cbn">'+sh+'</span><span class="cbv" style="color:'+col+'">'+b.pts+'/'+b.w+'</span></div>';
      });
      card.innerHTML=html;
    }
    grid.appendChild(card);
  });
  el.appendChild(grid);
  var tw=document.createElement('div');tw.className='tw';
  var thtml='<div class="tt">Promedio últimas 5 auditorías</div>';
  LOCS.forEach(function(loc){
    var aud=h.filter(function(a){return a.local===loc;}).slice(0,5);
    if(!aud.length)return;
    var avg=Math.round(aud.reduce(function(s,a){return s+a.total;},0)/aud.length);
    var col=avg>=80?'#4ade80':avg>=60?'#fbbf24':'#f87171';
    thtml+='<div class="trow"><div class="tlbl"><span style="color:var(--tx)">'+loc.replace('ENDER ','')+'</span><span style="font-family:DM Mono,monospace;color:'+col+'">'+avg+' pts ('+aud.length+' aud.)</span></div><div class="bbg"><div class="bf" style="width:'+avg+'%;background:'+col+'"></div></div></div>';
  });
  tw.innerHTML=thtml;el.appendChild(tw);
}

function renderE(){
  var el=document.getElementById('ve');
  el.innerHTML='';
  getHRemoto().then(function(remoto){
    var h=remoto&&remoto.length>0?remoto.map(function(r){return JSON.parse(r.data);}):getH();
    renderEData(h,el);
  }).catch(function(){renderEData(getH(),el);});
}

function renderEData(h,el){
  el.innerHTML='';

  // Buscar: search box
  var searchWrap=document.createElement('div');
  searchWrap.style.cssText='padding:8px 12px 4px';
  searchWrap.innerHTML='<input type="text" id="emp-search" placeholder="Buscar empleado..." oninput="filtrarEmpleados()" style="width:100%;background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:Inter,sans-serif;font-size:14px;outline:none">';
  el.appendChild(searchWrap);

  // Recopilar todos los empleados de todas las auditorias
  var empMap={};
  h.forEach(function(aud){
    if(!aud.empleados||!aud.secScores)return;
    Object.keys(aud.empleados).forEach(function(puesto){
      var nombres=aud.empleados[puesto].split(',');
      nombres.forEach(function(n){
        var nombre=n.trim();
        if(!nombre)return;
        if(!empMap[nombre])empMap[nombre]=[];
        var sec=aud.secScores[puesto];
        if(sec){
          empMap[nombre].push({
            fecha:aud.fecha,local:aud.local,turno:aud.turno,
            puesto:puesto,pct:sec.pct,tt:sec.tt,its:sec.its,id:aud.id
          });
        }
      });
    });
  });

  var nombres=Object.keys(empMap).sort();
  if(nombres.length===0){
    el.innerHTML+='<div class="em">No hay empleados registrados todavía.<br>Asigná empleados al guardar una auditoría.</div>';
    return;
  }

  var listWrap=document.createElement('div');
  listWrap.id='emp-list';
  listWrap.className='rc';

  nombres.forEach(function(nombre){
    var evals=empMap[nombre].sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
    var avgPct=Math.round(evals.reduce(function(s,e){return s+e.pct;},0)/evals.length);
    var cv2=cv(avgPct);
    var card=document.createElement('div');
    card.className='rcd';
    card.dataset.nombre=nombre.toLowerCase();

    var html='<div class="rcdh"><span class="rcdt">'+nombre+'</span><div style="text-align:right"><span class="rcds '+cv2+'">'+avgPct+'%</span><div style="font-size:10px;color:var(--mu);margin-top:2px">promedio desempeño</div></div></div>';

    // Historial de evaluaciones
    html+='<div style="padding:6px 16px 3px;font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.08em;border-top:1px solid var(--bd);background:var(--sf2)">Historial ('+evals.length+' evaluaciones)</div>';

    evals.slice(0,6).forEach(function(ev){
      var c=cv(ev.pct);
      html+='<div style="padding:10px 16px;border-top:1px solid var(--bd);background:var(--sf)">';
      html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
      html+='<div><div style="font-size:12px;font-weight:600">'+ev.fecha+' — '+ev.local+'</div><div style="font-size:11px;color:var(--mu);margin-top:1px">'+ev.turno+' · Puesto: '+ev.tt+'</div></div>';
      html+='<span style="font-family:Inter Mono,monospace;font-size:16px;font-weight:700;color:'+(ev.pct>=80?'var(--gr)':ev.pct>=60?'var(--yw)':'var(--rd)')+'">'+ev.pct+'%</span>';
      html+='</div>';

      // Items evaluados
      if(ev.its){
        Object.values(ev.its).forEach(function(it){
          if(it.v===null||it.v===-1)return;
          var val=it.t==='b'?(it.v===1?'SI':'NO'):it.t==='m'?(it.v===1?'Muy mal':it.v===2?'Mal':it.v===3?'Regular':it.v===4?'Bien':'Muy bien'):''+it.v+'/10';
          var col=it.t==='b'?(it.v===1?'var(--gr)':'var(--rd)'):it.t==='m'?(it.v>=5?'var(--gr)':it.v>=4?'#86efac':it.v===3?'var(--yw)':it.v===2?'#fca5a5':'var(--rd)'):(it.v>=8?'var(--gr)':it.v>=6?'var(--yw)':'var(--rd)');
          html+='<div style="display:flex;justify-content:space-between;padding:3px 0;border-top:1px solid var(--bd)">';
          html+='<span style="font-size:11px;color:var(--mu);flex:1">'+it.lb+'</span>';
          html+='<span style="font-family:Inter Mono,monospace;font-size:11px;font-weight:600;color:'+col+';margin-left:8px">'+val+'</span>';
          html+='</div>';
        });
      }
      html+='</div>';
    });

    card.innerHTML=html;
    listWrap.appendChild(card);
  });

  el.appendChild(listWrap);
}

function filtrarEmpleados(){
  var q=document.getElementById('emp-search').value.toLowerCase();
  document.querySelectorAll('#emp-list .rcd').forEach(function(card){
    card.style.display=card.dataset.nombre.includes(q)?'block':'none';
  });
}

function delA(id){
  if(!confirm('¿Eliminar esta auditoría?'))return;
  setH(getH().filter(function(a){return a.id!==id;}));
  sbFetch('DELETE','auditorias?app_id=eq.'+id).then(function(){
    renderL();
  }).catch(function(){
    renderL();
  });
}

build();
recalc();
</script>
